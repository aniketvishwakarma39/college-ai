<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Border Security Dashboard</title>

<style>

body{
background:#0f172a;
font-family:Segoe UI;
color:white;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.alert{
color:#ef4444;
font-size:18px;
margin-bottom:10px;
}

img{
width:100%;
border-radius:8px;
margin-top:10px;
}

button{
margin-top:10px;
padding:8px 14px;
border:none;
background:#ef4444;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Border Security Alerts</h1>

<div class="grid">

<div class="card">

<div class="alert">
⚠ Border Crossed
</div>

<img src="intruder1.jpg">

<p>Time: 02:10 AM</p>

<button>Delete Alert</button>

</div>

<div class="card">

<div class="alert">
⚠ Border Crossed
</div>

<img src="intruder2.jpg">

<p>Time: 03:22 AM</p>

<button>Delete Alert</button>

</div>

</div>

</body>
</html>
