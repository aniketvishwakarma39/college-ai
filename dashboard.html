<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Status Dashboard</title>

<style>

body{
background:#0f172a;
font-family:Segoe UI;
color:white;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.status{
font-size:20px;
margin-top:10px;
}

.running{
color:#22c55e;
}

.empty{
color:#ef4444;
}

img{
width:100%;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Live Class Status</h1>

<div class="grid">

<div class="card">

<h3>AI Class</h3>

<div class="status running">
Teacher Present
</div>

<img src="screenshot1.jpg">

<p>Time: 10:05</p>

</div>

<div class="card">

<h3>Data Science</h3>

<div class="status empty">
Bell Empty
</div>

<p>No teacher detected</p>

</div>

</div>

</body>
</html>
